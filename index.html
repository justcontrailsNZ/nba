<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Team Hub & Live Standings</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        
        .layout-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 1450px;
            margin: 0 auto;
        }
        
        .left-col {
            flex: 6;
            min-width: 600px;
        }
        
        .right-col {
            flex: 4;
            min-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header-box { text-align: center; margin-bottom: 20px; }
        h1 { color: #1d428a; margin-bottom: 5px; }
        .subtitle { color: #555; font-size: 14px; }
        
        .controls { text-align: center; margin-bottom: 30px; }
        select, button { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; margin: 5px; }
        button { background-color: #c8102e; color: white; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #a00c24; }
        
        .section-title {
            font-size: 20px;
            color: #1d428a;
            border-bottom: 2px solid #c8102e;
            padding-bottom: 5px;
            margin-bottom: 15px;
            display: inline-block;
        }

        /* Grids & Cards */
        .grid { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 40px; }
        
        .game-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 360px;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border: 1px solid #e1e4e8;
        }
        .game-header { text-align: center; font-size: 13px; color: #777; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 10px; font-weight: bold; }
        .team-score { display: flex; justify-content: space-between; font-size: 17px; margin: 6px 0; font-weight: bold; }
        .winner { color: #1d428a; }
        .loser { color: #888; font-weight: normal; }
        .spread-box { text-align: center; background-color: #f8f9fa; border: 1px dashed #ccc; padding: 5px; font-size: 12px; border-radius: 4px; margin: 10px 0; color: #444; font-weight: bold; }

        .performers-box { border-radius: 6px; margin-top: 10px; background-color: #fff; border: 1px solid #ddd; overflow: hidden; }
        .team-perf-title { font-size: 12px; font-weight: bold; text-transform: uppercase; padding: 6px 10px; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.6); }
        .performer-list { list-style-type: none; padding: 8px 10px; margin: 0; font-size: 12px; color: #333; background-color: #fafafa; }
        .performer-list li { margin-bottom: 4px; }

        .news-card {
            background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%; max-width: 320px; padding: 15px; box-sizing: border-box;
            display: flex; flex-direction: column; border: 1px solid #e1e4e8;
        }
        .news-card h3 { font-size: 16px; margin-top: 0; line-height: 1.3; }
        .news-card a { text-decoration: none; color: #1d428a; }
        .news-card a:hover { text-decoration: underline; }
        .news-card p { font-size: 13px; color: #555; line-height: 1.4; flex-grow: 1; margin: 10px 0; }
        .news-date { font-size: 11px; color: #888; margin-top: auto; padding-top: 10px; border-top: 1px solid #eee; }

        /* Widget Boxes */
        .widget-box { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 15px; border: 1px solid #e1e4e8; }
        .widget-box h2 { font-size: 18px; color: #333; margin-top: 0; border-bottom: 2px solid #1d428a; padding-bottom: 5px; }
        
        /* Standings */
        .conf-title { font-size: 14px; color: white; margin: 15px 0 0 0; background: #c8102e; padding: 8px; border-radius: 4px 4px 0 0; text-align: center;}
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 6px; color: #555; background-color: #f1f3f5; border-bottom: 2px solid #ddd; }
        td { padding: 6px; border-bottom: 1px solid #eee; }
        tr:hover { background-color: #f9f9f9; }
        
        /* Leaders Grid System */
        .leaders-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .leader-cat-box { background: #fafafa; border: 1px solid #eee; border-radius: 6px; overflow: hidden; }
        .leader-cat-box h3 { margin: 0; font-size: 13px; color: #fff; background: #1d428a; padding: 6px; text-align: center; text-transform: uppercase; }
        .leaders-list { margin: 0; padding: 10px; font-size: 12px; color: #333; list-style-type: none; }
        .leaders-list li { margin-bottom: 6px; border-bottom: 1px dashed #e1e4e8; padding-bottom: 4px; display: flex; justify-content: space-between; }
        .leaders-list li:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .val { font-weight: bold; color: #c8102e; }

        .loading { color: #666; font-style: italic; font-size: 13px; padding: 10px; }
    </style>
</head>
<body onload="initGlobalData()">

    <div class="header-box">
        <h1>🏀 NBA Dashboard</h1>
        <div class="subtitle">Select a team for local news, or view live global standings & stats</div>
    </div>
    
    <div class="controls">
        <select id="team-select">
            <option value="Atlanta Hawks" data-id="1">Atlanta Hawks</option>
            <option value="Boston Celtics" data-id="2">Boston Celtics</option>
            <option value="Brooklyn Nets" data-id="17">Brooklyn Nets</option>
            <option value="Charlotte Hornets" data-id="30">Charlotte Hornets</option>
            <option value="Chicago Bulls" data-id="4">Chicago Bulls</option>
            <option value="Cleveland Cavaliers" data-id="5">Cleveland Cavaliers</option>
            <option value="Dallas Mavericks" data-id="6">Dallas Mavericks</option>
            <option value="Denver Nuggets" data-id="7">Denver Nuggets</option>
            <option value="Detroit Pistons" data-id="8">Detroit Pistons</option>
            <option value="Golden State Warriors" data-id="9">Golden State Warriors</option>
            <option value="Houston Rockets" data-id="10">Houston Rockets</option>
            <option value="Indiana Pacers" data-id="11">Indiana Pacers</option>
            <option value="LA Clippers" data-id="12">LA Clippers</option>
            <option value="Los Angeles Lakers" data-id="13">Los Angeles Lakers</option>
            <option value="Memphis Grizzlies" data-id="29">Memphis Grizzlies</option>
            <option value="Miami Heat" data-id="14">Miami Heat</option>
            <option value="Milwaukee Bucks" data-id="15">Milwaukee Bucks</option>
            <option value="Minnesota Timberwolves" data-id="16">Minnesota Timberwolves</option>
            <option value="New Orleans Pelicans" data-id="3">New Orleans Pelicans</option>
            <option value="New York Knicks" data-id="18">New York Knicks</option>
            <option value="Oklahoma City Thunder" data-id="25">Oklahoma City Thunder</option>
            <option value="Orlando Magic" data-id="19">Orlando Magic</option>
            <option value="Philadelphia 76ers" data-id="20">Philadelphia 76ers</option>
            <option value="Phoenix Suns" data-id="21">Phoenix Suns</option>
            <option value="Portland Trail Blazers" data-id="22">Portland Trail Blazers</option>
            <option value="Sacramento Kings" data-id="23">Sacramento Kings</option>
            <option value="San Antonio Spurs" data-id="24">San Antonio Spurs</option>
            <option value="Toronto Raptors" data-id="28">Toronto Raptors</option>
            <option value="Utah Jazz" data-id="26">Utah Jazz</option>
            <option value="Washington Wizards" data-id="27">Washington Wizards</option>
        </select>
        <button onclick="fetchTeamData()">Get Team Info</button>
    </div>

    <div class="layout-container">
        
        <!-- LEFT COLUMN: TEAM DATA -->
        <div class="left-col">
            <div id="team-content" style="display:none;">
                <div class="section-title">Upcoming Match</div>
                <div class="grid" id="next-game-container"></div>
                
                <div class="section-title">Last 5 Matches</div>
                <div class="grid" id="past-games-container"></div>

                <div class="section-title">Latest Team News</div>
                <div class="grid" id="news-container"></div>
            </div>
            <div id="team-placeholder">
                <p style="color:#777; text-align:center; padding: 50px;">Use the dropdown above to load specific team data.</p>
            </div>
        </div>

        <!-- RIGHT COLUMN: STANDINGS & LEADERS -->
        <div class="right-col">
            <div class="widget-box">
                <h2>🏆 NBA Standings</h2>
                <div id="standings-container"><div class="loading">Loading Standings...</div></div>
            </div>
            
            <div class="widget-box">
                <h2>🔥 League Leaders (Top 15)</h2>
                <div id="leaders-container"><div class="loading">Loading Leaders...</div></div>
            </div>
        </div>
        
    </div>

    <script>
        const NEWS_API_KEY = 'pub_dce2909d7f99428199a11eb8be5c290e';

        function initGlobalData() {
            fetchStandings();
            fetchLeaders();
        }

        // --- FETCH STANDINGS ---
        async function fetchStandings() {
            try {
                const res = await fetch('https://site.api.espn.com/apis/v2/sports/basketball/nba/standings');
                const data = await res.json();
                
                let html = '';
                if(data && data.children) {
                    data.children.forEach(conf => {
                        html += `<div class="conf-title">${conf.name || 'Conference'}</div>`;
                        html += `<table><tr><th>#</th><th>Team</th><th>W-L</th><th>GB</th><th>L10</th></tr>`;
                        
                        // Explicitly sort teams to ensure #1 seed is at the top
                        let sortedTeams = conf.standings.entries.sort((a, b) => {
                            const seedA = parseInt(a.stats.find(s => s.name === 'playoffSeed')?.value || 99);
                            const seedB = parseInt(b.stats.find(s => s.name === 'playoffSeed')?.value || 99);
                            return seedA - seedB;
                        });

                        sortedTeams.forEach(team => {
                            const seed = team.stats.find(s => s.name === 'playoffSeed')?.value || '-';
                            const wins = team.stats.find(s => s.name === 'wins')?.value || 0;
                            const losses = team.stats.find(s => s.name === 'losses')?.value || 0;
                            const gb = team.stats.find(s => s.name === 'gamesBehind')?.displayValue || '-';
                            
                            // Find Last 10 stat
                            const l10 = team.stats.find(s => s.abbreviation === 'L10' || s.name === 'last10Games')?.displayValue || '-';
                            const name = team.team.shortDisplayName || team.team.displayName || 'Unknown';
                            
                            html += `<tr><td><b>${seed}</b></td><td>${name}</td><td>${wins}-${losses}</td><td>${gb}</td><td>${l10}</td></tr>`;
                        });
                        html += `</table>`;
                    });
                }
                document.getElementById('standings-container').innerHTML = html;
            } catch (e) {
                document.getElementById('standings-container').innerHTML = '<p style="color:red">Failed to load standings.</p>';
            }
        }

        // --- FETCH LEAGUE LEADERS ---
        async function fetchLeaders() {
            try {
                // Fixed endpoint: Uses 'statistics' to pull global league leaders
                const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/nba/statistics?limit=15');
                const data = await res.json();
                
                const categoriesObj = data.stats || data.categories || [];
                const targetCategories = ['points', 'assists', 'rebounds', 'blocks', 'steals', '3-pt-fg-made'];
                
                let html = '<div class="leaders-grid">';
                
                categoriesObj.forEach(cat => {
                    const catName = (cat.name || cat.shortDisplayName || '').toLowerCase();
                    if (targetCategories.includes(catName)) {
                        
                        html += `<div class="leader-cat-box">`;
                        html += `<h3>${cat.displayName || cat.name}</h3><ul class="leaders-list">`;
                        
                        if(cat.leaders && cat.leaders.length > 0) {
                            cat.leaders.forEach(p => {
                                // Robust fallback for all player/team names to avoid "undefined"
                                const pName = p.athlete?.shortName || p.athlete?.displayName || 'Unknown';
                                const teamAbbr = p.team?.abbreviation ? `(${p.team.abbreviation})` : '';
                                const val = p.displayValue || p.value || 0;
                                
                                html += `<li><span>${pName} <span style="color:#888;font-size:10px;">${teamAbbr}</span></span> <span class="val">${val}</span></li>`;
                            });
                        } else {
                            html += `<li>Stats unavailable</li>`;
                        }
                        html += `</ul></div>`;
                    }
                });
                
                html += '</div>';
                document.getElementById('leaders-container').innerHTML = html;
            } catch (e) {
                document.getElementById('leaders-container').innerHTML = '<p style="color:red">Failed to load leaders.</p>';
            }
        }

        // --- FETCH TEAM DATA (Games + News) ---
        function fetchTeamData() {
            const selectEl = document.getElementById('team-select');
            const teamName = selectEl.value;
            const espnId = selectEl.options[selectEl.selectedIndex].getAttribute('data-id');

            document.getElementById('team-placeholder').style.display = 'none';
            document.getElementById('team-content').style.display = 'block';

            fetchGames(espnId);
            fetchNews(teamName);
        }

        async function fetchGames(espnId) {
            const nextContainer = document.getElementById('next-game-container');
            const pastContainer = document.getElementById('past-games-container');
            
            nextContainer.innerHTML = '<div class="loading">Finding next game...</div>';
            pastContainer.innerHTML = '<div class="loading">Loading match history...</div>';

            try {
                const scheduleRes = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/nba/teams/${espnId}/schedule`);
                const scheduleData = await scheduleRes.json();

                const completedGames = scheduleData.events.filter(e => e.competitions[0].status.type.completed === true);
                const upcomingGames = scheduleData.events.filter(e => e.competitions[0].status.type.completed === false);

                const last5Games = completedGames.slice(-5).reverse();
                const nextGame = upcomingGames.length > 0 ? upcomingGames[0] : null;

                if (nextGame) {
                    nextContainer.innerHTML = await buildGameCard(nextGame.id, true);
                } else {
                    nextContainer.innerHTML = '<p>No upcoming games scheduled.</p>';
                }

                if (last5Games.length === 0) {
                    pastContainer.innerHTML = '<p>No completed games found.</p>';
                } else {
                    const pastHTMLs = await Promise.all(last5Games.map(g => buildGameCard(g.id, false)));
                    pastContainer.innerHTML = pastHTMLs.join('');
                }

            } catch (error) {
                nextContainer.innerHTML = '<div class="loading" style="color:red;">Failed to load schedule.</div>';
                pastContainer.innerHTML = '';
            }
        }

        async function buildGameCard(matchId, isUpcoming) {
            try {
                const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/nba/summary?event=${matchId}`);
                const data = await res.json();

                const headerComp = data.header.competitions[0];
                const dateObj = new Date(headerComp.date);
                const dateStr = dateObj.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                
                const homeTeam = headerComp.competitors.find(c => c.homeAway === 'home');
                const awayTeam = headerComp.competitors.find(c => c.homeAway === 'away');

                const homeClass = isUpcoming ? '' : (homeTeam.winner ? 'winner' : 'loser');
                const awayClass = isUpcoming ? '' : (awayTeam.winner ? 'winner' : 'loser');
                const homeScore = isUpcoming ? '' : (homeTeam.score || '0');
                const awayScore = isUpcoming ? '' : (awayTeam.score || '0');
                
                // Fallbacks to prevent undefined names
                const homeName = homeTeam.team.shortDisplayName || homeTeam.team.displayName || 'Home Team';
                const homeAbbr = homeTeam.team.abbreviation || 'HME';
                const awayName = awayTeam.team.shortDisplayName || awayTeam.team.displayName || 'Away Team';
                const awayAbbr = awayTeam.team.abbreviation || 'AWY';

                let spreadStr = "Spread Not Available";
                if (data.pickcenter && data.pickcenter.length > 0 && data.pickcenter[0].details) {
                    spreadStr = `Odds: ${data.pickcenter[0].details}`;
                    if (data.pickcenter[0].overUnder) spreadStr += ` | O/U: ${data.pickcenter[0].overUnder}`;
                }

                let performersHTML = '';
                
                if (isUpcoming) {
                    headerComp.competitors.forEach(comp => {
                        const tName = comp.team.displayName || 'Team';
                        const bgColor = comp.team.color || '333333';
                        
                        performersHTML += `<div class="performers-box">`;
                        performersHTML += `<div class="team-perf-title" style="background-color: #${bgColor};">${tName} Leaders</div><ul class="performer-list">`;
                        
                        if (comp.leaders && comp.leaders.length > 0) {
                            comp.leaders.forEach(l => {
                                const statName = l.shortDisplayName || l.name || '';
                                const leaderObj = l.leaders[0];
                                if (leaderObj && leaderObj.athlete) {
                                    const lName = leaderObj.athlete.shortName || 'Unknown';
                                    performersHTML += `<li><b>${lName}</b>: ${leaderObj.value || 0} ${statName}</li>`;
                                }
                            });
                        } else {
                            performersHTML += `<li>Season leaders not available</li>`;
                        }
                        performersHTML += `</ul></div>`;
                    });
                } else {
                    if (data.boxscore && data.boxscore.players) {
                        data.boxscore.players.forEach(teamData => {
                            const tName = teamData.team.displayName || 'Team';
                            const bgColor = teamData.team.color || '333333';
                            const statsData = teamData.statistics[0];
                            
                            performersHTML += `<div class="performers-box">`;
                            performersHTML += `<div class="team-perf-title" style="background-color: #${bgColor};">${tName} Top 3</div><ul class="performer-list">`;
                            
                            if (statsData && statsData.athletes) {
                                const labels = statsData.labels || [];
                                const ptsIdx = labels.indexOf('PTS');
                                const rebIdx = labels.indexOf('REB');
                                const astIdx = labels.indexOf('AST');

                                const activePlayers = statsData.athletes.filter(a => !a.didNotPlay);
                                activePlayers.sort((a, b) => parseInt((b.stats && b.stats[ptsIdx]) || 0) - parseInt((a.stats && a.stats[ptsIdx]) || 0));
                                
                                const top3 = activePlayers.slice(0, 3);
                                if(top3.length > 0) {
                                    top3.forEach(p => {
                                        const pName = p.athlete?.shortName || 'Unknown';
                                        const pts = (p.stats && p.stats[ptsIdx]) || 0;
                                        const reb = (p.stats && p.stats[rebIdx]) || 0;
                                        const ast = (p.stats && p.stats[astIdx]) || 0;
                                        performersHTML += `<li><b>${pName}</b>: ${pts} PTS, ${reb} REB, ${ast} AST</li>`;
                                    });
                                } else {
                                    performersHTML += `<li>No active player stats</li>`;
                                }
                            } else {
                                performersHTML += `<li>Stats not available</li>`;
                            }
                            performersHTML += `</ul></div>`;
                        });
                    }
                }

                return `
                    <div class="game-card">
                        <div class="game-header">${dateStr} • ${headerComp.status?.type?.detail || 'Scheduled'}</div>
                        <div class="team-score ${awayClass}">
                            <span>${awayAbbr} ${awayName}</span><span>${awayScore}</span>
                        </div>
                        <div class="team-score ${homeClass}">
                            <span>${homeAbbr} ${homeName} (H)</span><span>${homeScore}</span>
                        </div>
                        <div class="spread-box">🎯 ${spreadStr}</div>
                        ${performersHTML}
                    </div>
                `;
            } catch (e) {
                return `<div class="game-card"><p style="color:red; font-size:12px;">Error loading game details</p></div>`;
            }
        }

        async function fetchNews(teamName) {
            const container = document.getElementById('news-container');
            container.innerHTML = '<div class="loading">Searching for the latest news articles...</div>';

            const query = teamName.split(' ').join(' AND ');
            const url = `https://newsdata.io/api/1/news?apikey=${NEWS_API_KEY}&q=${encodeURIComponent(query)}&category=sports&language=en`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                container.innerHTML = ''; 

                if (data.status === "error") {
                    container.innerHTML = `<p style="color:red;">Error: ${data.results.message || data.message || 'API Error'}</p>`;
                    return;
                }

                if (data.results && data.results.length > 0) {
                    const teamMascot = teamName.split(' ').pop().toLowerCase();
                    const relevantArticles = data.results.filter(article => {
                        const titleText = (article.title || "").toLowerCase();
                        const descText = (article.description || "").toLowerCase();
                        return titleText.includes(teamMascot) || descText.includes(teamMascot);
                    });

                    if (relevantArticles.length > 0) {
                        relevantArticles.forEach(article => {
                            const date = new Date(article.pubDate).toLocaleDateString();
                            let description = "Click the link to read the full story.";
                            if (article.description) description = article.description.length > 150 ? article.description.substring(0, 150) + "..." : article.description;
                            
                            // Prevent undefined title/links
                            const title = article.title || 'Read latest update';
                            const link = article.link || '#';

                            const card = document.createElement('div');
                            card.className = 'news-card';
                            card.innerHTML = `
                                <h3><a href="${link}" target="_blank">${title}</a></h3>
                                <p>${description}</p>
                                <div class="news-date">Published: ${date}</div>
                            `;
                            container.appendChild(card);
                        });
                    } else {
                        container.innerHTML = '<p>No specific news found for this team right now.</p>';
                    }
                } else {
                    container.innerHTML = '<p>No news found for this team right now.</p>';
                }

            } catch (error) {
                container.innerHTML = '<p style="color:red;">Something went wrong. Please check your console.</p>';
            }
        }
    </script>
</body>
</html>
