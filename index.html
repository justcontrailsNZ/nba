<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Team Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #1d428a; margin-bottom: 5px; }
        .subtitle { color: #555; margin-bottom: 25px; font-size: 14px; }
        
        .controls { margin-bottom: 30px; }
        select, button {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin: 5px;
        }
        button {
            background-color: #c8102e; 
            color: white;
            cursor: pointer;
            border: none;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background-color: #a00c24; }
        
        .section-container {
            max-width: 1200px;
            margin: 0 auto 40px auto;
            text-align: left;
        }
        .section-title {
            font-size: 22px;
            color: #1d428a;
            border-bottom: 2px solid #c8102e;
            padding-bottom: 8px;
            margin-bottom: 20px;
            display: inline-block;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 20px;
        }
        
        /* Game Card Styles */
        .game-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 360px;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        .game-header {
            text-align: center;
            font-size: 14px;
            color: #777;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .team-score {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            margin: 5px 0;
            font-weight: bold;
        }
        .winner { color: #1d428a; }
        .loser { color: #888; font-weight: normal; }
        
        .spread-box {
            text-align: center;
            background-color: #eef2f5;
            padding: 5px;
            font-size: 12px;
            border-radius: 4px;
            margin: 10px 0;
            color: #444;
            font-weight: bold;
        }

        /* Performers Box with Dynamic Team Colors */
        .performers-box {
            border-radius: 6px;
            padding: 10px;
            margin-top: 10px;
            color: #ffffff; /* White text */
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8); /* Dark shadow ensures readability on bright colors */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }
        .team-perf-title {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            padding-bottom: 4px;
        }
        .performer-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
            font-size: 13px;
        }
        .performer-list li { margin-bottom: 3px; }

        /* Text-Only News Card Styles */
        .news-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 320px;
            padding: 20px;
            box-sizing: border-box;
            text-align: left;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }
        .news-card:hover { transform: translateY(-5px); }
        .news-card h3 {
            font-size: 17px;
            margin-top: 0;
            line-height: 1.3;
        }
        .news-card a { text-decoration: none; color: #1d428a; }
        .news-card a:hover { text-decoration: underline; }
        .news-card p {
            font-size: 14px;
            color: #444;
            line-height: 1.5;
            flex-grow: 1;
        }
        .news-date {
            font-size: 12px;
            color: #888;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .loading { text-align: left; color: #666; width: 100%; font-style: italic; }
    </style>
</head>
<body>

    <h1>🏀 NBA Team Hub</h1>
    <div class="subtitle">Next Match, Last 5 Results, Betting Spreads & Latest News</div>
    
    <div class="controls">
        <select id="team-select">
            <option value="Atlanta Hawks" data-id="1">Atlanta Hawks</option>
            <option value="Boston Celtics" data-id="2">Boston Celtics</option>
            <option value="Brooklyn Nets" data-id="17">Brooklyn Nets</option>
            <option value="Charlotte Hornets" data-id="30">Charlotte Hornets</option>
            <option value="Chicago Bulls" data-id="4">Chicago Bulls</option>
            <option value="Cleveland Cavaliers" data-id="5">Cleveland Cavaliers</option>
            <option value="Dallas Mavericks" data-id="6">Dallas Mavericks</option>
            <option value="Denver Nuggets" data-id="7">Denver Nuggets</option>
            <option value="Detroit Pistons" data-id="8">Detroit Pistons</option>
            <option value="Golden State Warriors" data-id="9">Golden State Warriors</option>
            <option value="Houston Rockets" data-id="10">Houston Rockets</option>
            <option value="Indiana Pacers" data-id="11">Indiana Pacers</option>
            <option value="LA Clippers" data-id="12">LA Clippers</option>
            <option value="Los Angeles Lakers" data-id="13">Los Angeles Lakers</option>
            <option value="Memphis Grizzlies" data-id="29">Memphis Grizzlies</option>
            <option value="Miami Heat" data-id="14">Miami Heat</option>
            <option value="Milwaukee Bucks" data-id="15">Milwaukee Bucks</option>
            <option value="Minnesota Timberwolves" data-id="16">Minnesota Timberwolves</option>
            <option value="New Orleans Pelicans" data-id="3">New Orleans Pelicans</option>
            <option value="New York Knicks" data-id="18">New York Knicks</option>
            <option value="Oklahoma City Thunder" data-id="25">Oklahoma City Thunder</option>
            <option value="Orlando Magic" data-id="19">Orlando Magic</option>
            <option value="Philadelphia 76ers" data-id="20">Philadelphia 76ers</option>
            <option value="Phoenix Suns" data-id="21">Phoenix Suns</option>
            <option value="Portland Trail Blazers" data-id="22">Portland Trail Blazers</option>
            <option value="Sacramento Kings" data-id="23">Sacramento Kings</option>
            <option value="San Antonio Spurs" data-id="24">San Antonio Spurs</option>
            <option value="Toronto Raptors" data-id="28">Toronto Raptors</option>
            <option value="Utah Jazz" data-id="26">Utah Jazz</option>
            <option value="Washington Wizards" data-id="27">Washington Wizards</option>
        </select>
        <button onclick="fetchAllData()">Get Team Info</button>
    </div>

    <div class="section-container" id="games-section" style="display:none;">
        <div class="section-title">Upcoming Match</div>
        <div class="grid" id="next-game-container"></div>
        
        <br><br>

        <div class="section-title">Last 5 Matches</div>
        <div class="grid" id="past-games-container"></div>
    </div>

    <div class="section-container" id="news-section" style="display:none;">
        <div class="section-title">Latest Team News</div>
        <div class="grid" id="news-container"></div>
    </div>

    <script>
        const NEWS_API_KEY = 'pub_dce2909d7f99428199a11eb8be5c290e';

        function fetchAllData() {
            const selectEl = document.getElementById('team-select');
            const teamName = selectEl.value;
            const espnId = selectEl.options[selectEl.selectedIndex].getAttribute('data-id');

            document.getElementById('games-section').style.display = 'block';
            document.getElementById('news-section').style.display = 'block';

            fetchGames(espnId);
            fetchNews(teamName);
        }

        async function fetchGames(espnId) {
            const nextContainer = document.getElementById('next-game-container');
            const pastContainer = document.getElementById('past-games-container');
            
            nextContainer.innerHTML = '<div class="loading">Finding next game...</div>';
            pastContainer.innerHTML = '<div class="loading">Loading match history...</div>';

            try {
                // Get the team's full schedule
                const scheduleRes = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/nba/teams/${espnId}/schedule`);
                const scheduleData = await scheduleRes.json();

                // Separate completed games from upcoming games
                const completedGames = scheduleData.events.filter(e => e.competitions[0].status.type.completed === true);
                const upcomingGames = scheduleData.events.filter(e => e.competitions[0].status.type.completed === false);

                const last5Games = completedGames.slice(-5).reverse();
                const nextGame = upcomingGames.length > 0 ? upcomingGames[0] : null;

                // Process Next Game
                nextContainer.innerHTML = '';
                if (nextGame) {
                    const cardHTML = await buildGameCard(nextGame.id, true);
                    nextContainer.innerHTML = cardHTML;
                } else {
                    nextContainer.innerHTML = '<p>No upcoming games scheduled.</p>';
                }

                // Process Past 5 Games
                pastContainer.innerHTML = '';
                if (last5Games.length === 0) {
                    pastContainer.innerHTML = '<p>No completed games found.</p>';
                } else {
                    // Fetch all 5 summaries at the same time for speed
                    const pastHTMLs = await Promise.all(last5Games.map(g => buildGameCard(g.id, false)));
                    pastContainer.innerHTML = pastHTMLs.join('');
                }

            } catch (error) {
                console.error(error);
                nextContainer.innerHTML = '<div class="loading" style="color:red;">Failed to load schedule.</div>';
                pastContainer.innerHTML = '';
            }
        }

        // Helper function that builds the HTML card for both past and future games
        async function buildGameCard(matchId, isUpcoming) {
            try {
                const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/nba/summary?event=${matchId}`);
                const data = await res.json();

                const headerComp = data.header.competitions[0];
                const dateObj = new Date(headerComp.date);
                const dateStr = dateObj.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                
                const homeTeam = headerComp.competitors.find(c => c.homeAway === 'home');
                const awayTeam = headerComp.competitors.find(c => c.homeAway === 'away');

                // Set scores/winners for past games, leave blank for future games
                const homeClass = isUpcoming ? '' : (homeTeam.winner ? 'winner' : 'loser');
                const awayClass = isUpcoming ? '' : (awayTeam.winner ? 'winner' : 'loser');
                const homeScore = isUpcoming ? '' : homeTeam.score;
                const awayScore = isUpcoming ? '' : awayTeam.score;

                // Extract Betting Spread
                let spreadStr = "Spread Not Available";
                if (data.pickcenter && data.pickcenter.length > 0 && data.pickcenter[0].details) {
                    spreadStr = `Odds: ${data.pickcenter[0].details}`;
                    if (data.pickcenter[0].overUnder) spreadStr += ` | O/U: ${data.pickcenter[0].overUnder}`;
                }

                // Build Performers HTML with specific Team Background Colors
                let performersHTML = '';
                
                if (isUpcoming) {
                    // Pre-game: Show Season Leaders
                    headerComp.competitors.forEach(comp => {
                        const tName = comp.team.displayName;
                        const bgColor = comp.team.color || '333333';
                        
                        performersHTML += `<div class="performers-box" style="background-color: #${bgColor};">`;
                        performersHTML += `<div class="team-perf-title">${tName} Leaders</div><ul class="performer-list">`;
                        
                        if (comp.leaders && comp.leaders.length > 0) {
                            comp.leaders.forEach(l => {
                                const statName = l.shortDisplayName || l.name;
                                const leaderObj = l.leaders[0];
                                if (leaderObj) {
                                    performersHTML += `<li><b>${leaderObj.athlete.shortName}</b>: ${leaderObj.value} ${statName}</li>`;
                                }
                            });
                        } else {
                            performersHTML += `<li>Season leaders not available</li>`;
                        }
                        performersHTML += `</ul></div>`;
                    });
                } else {
                    // Post-game: Show actual Top 3 Performers
                    if (data.boxscore && data.boxscore.players) {
                        data.boxscore.players.forEach(teamData => {
                            const tName = teamData.team.displayName;
                            const bgColor = teamData.team.color || '333333';
                            const statsData = teamData.statistics[0];
                            
                            performersHTML += `<div class="performers-box" style="background-color: #${bgColor};">`;
                            performersHTML += `<div class="team-perf-title">${tName} Top 3</div><ul class="performer-list">`;
                            
                            if (statsData) {
                                const labels = statsData.labels;
                                const ptsIdx = labels.indexOf('PTS');
                                const rebIdx = labels.indexOf('REB');
                                const astIdx = labels.indexOf('AST');

                                const activePlayers = statsData.athletes.filter(a => !a.didNotPlay);
                                activePlayers.sort((a, b) => parseInt(b.stats[ptsIdx] || 0) - parseInt(a.stats[ptsIdx] || 0));
                                
                                const top3 = activePlayers.slice(0, 3);
                                top3.forEach(p => {
                                    performersHTML += `<li><b>${p.athlete.shortName}</b>: ${p.stats[ptsIdx]} PTS, ${p.stats[rebIdx]} REB, ${p.stats[astIdx]} AST</li>`;
                                });
                            } else {
                                performersHTML += `<li>Stats not available</li>`;
                            }
                            performersHTML += `</ul></div>`;
                        });
                    }
                }

                return `
                    <div class="game-card">
                        <div class="game-header">${dateStr} • ${headerComp.status.type.detail}</div>
                        
                        <div class="team-score ${awayClass}">
                            <span>${awayTeam.team.abbreviation} ${awayTeam.team.shortDisplayName}</span>
                            <span>${awayScore}</span>
                        </div>
                        <div class="team-score ${homeClass}">
                            <span>${homeTeam.team.abbreviation} ${homeTeam.team.shortDisplayName} (H)</span>
                            <span>${homeScore}</span>
                        </div>
                        
                        <div class="spread-box">🎯 ${spreadStr}</div>
                        
                        ${performersHTML}
                    </div>
                `;
            } catch (e) {
                return `<div class="game-card"><p style="color:red; font-size:12px;">Error loading game details</p></div>`;
            }
        }

        // --- FETCH LATEST NEWS ---
        async function fetchNews(teamName) {
            const container = document.getElementById('news-container');
            container.innerHTML = '<div class="loading">Searching for the latest news articles...</div>';

            const query = teamName.split(' ').join(' AND ');
            const url = `https://newsdata.io/api/1/news?apikey=${NEWS_API_KEY}&q=${encodeURIComponent(query)}&category=sports&language=en`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                container.innerHTML = ''; 

                if (data.status === "error") {
                    container.innerHTML = `<p style="color:red;">Error: ${data.results.message || data.message}</p>`;
                    return;
                }

                if (data.results && data.results.length > 0) {
                    const teamMascot = teamName.split(' ').pop().toLowerCase();

                    const relevantArticles = data.results.filter(article => {
                        const titleText = (article.title || "").toLowerCase();
                        const descText = (article.description || "").toLowerCase();
                        return titleText.includes(teamMascot) || descText.includes(teamMascot);
                    });

                    if (relevantArticles.length > 0) {
                        relevantArticles.forEach(article => {
                            const date = new Date(article.pubDate).toLocaleDateString();
                            
                            let description = "Click the link to read the full story.";
                            if (article.description) {
                                description = article.description.length > 180 ? article.description.substring(0, 180) + "..." : article.description;
                            }

                            const card = document.createElement('div');
                            card.className = 'news-card'; // Changed class to text-only style
                            card.innerHTML = `
                                <h3><a href="${article.link}" target="_blank">${article.title}</a></h3>
                                <p>${description}</p>
                                <div class="news-date">Published: ${date}</div>
                            `;
                            container.appendChild(card);
                        });
                    } else {
                        container.innerHTML = '<p>No specific news found for this team right now.</p>';
                    }
                } else {
                    container.innerHTML = '<p>No news found for this team right now.</p>';
                }

            } catch (error) {
                console.error("Error fetching news:", error);
                container.innerHTML = '<p style="color:red;">Something went wrong. Please check your console.</p>';
            }
        }
    </script>
</body>
</html>
