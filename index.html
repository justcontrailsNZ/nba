<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Betting Analytics Dashboard</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #f4f6fa, #e9edf5);
    margin: 0;
    padding: 20px;
    color: #222;
}

.layout-container {
    display: flex;
    flex-wrap: wrap;
    gap: 30px;
    max-width: 1500px;
    margin: auto;
}

.left-col { flex: 6; min-width: 600px; }
.right-col { flex: 4; min-width: 400px; display: flex; flex-direction: column; gap: 20px; }

h1 { text-align:center; color:#1d428a; }

.section-title {
    font-weight: 700;
    text-transform: uppercase;
    font-size: 15px;
    color: #1d428a;
    margin-bottom: 12px;
}

.controls { text-align:center; margin-bottom:20px; }

select, button {
    padding: 10px 14px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    background: linear-gradient(135deg, #c8102e, #8f0e22);
    color: white;
    font-weight:bold;
    cursor:pointer;
}

.grid { display:flex; flex-wrap:wrap; gap:20px; margin-bottom:30px; }

.game-card, .widget-box {
    background:white;
    border-radius:10px;
    padding:16px;
    border:1px solid #ddd;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    transition:0.2s;
}

.game-card:hover { transform:translateY(-4px); }

.game-header {
    text-align:center;
    font-size:13px;
    color:#777;
    border-bottom:1px solid #eee;
    margin-bottom:10px;
    padding-bottom:6px;
}

.team-score {
    display:flex;
    justify-content:space-between;
    font-weight:bold;
    margin:6px 0;
}

.winner { color:#1d428a; }
.loser { color:#999; }

.spread-box {
    text-align:center;
    background:#f8f9fa;
    padding:6px;
    border-radius:6px;
    margin-top:8px;
    font-size:12px;
}

.covered { color:green; font-weight:bold; text-align:center; }
.not-covered { color:red; font-weight:bold; text-align:center; }

.insight-box {
    background:linear-gradient(135deg,#1d428a,#0b1f3d);
    color:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

.prob-bar {
    height:8px;
    background:#eee;
    border-radius:10px;
    overflow:hidden;
    margin-top:8px;
}

.home-prob {
    height:100%;
    background:#c8102e;
}

.loading { font-style:italic; color:#777; }
</style>
</head>

<body>

<h1>🏀 NBA Betting Analytics Dashboard</h1>

<div class="controls">
<select id="team-select">
<option value="1">Atlanta Hawks</option>
<option value="2">Boston Celtics</option>
<option value="13">Los Angeles Lakers</option>
<option value="9">Golden State Warriors</option>
<option value="15">Milwaukee Bucks</option>
<option value="20">Philadelphia 76ers</option>
<option value="21">Phoenix Suns</option>
<option value="25">Oklahoma City Thunder</option>
</select>
<button onclick="fetchGames()">Load Team</button>
</div>

<div class="layout-container">

<div class="left-col">

<div class="section-title">📊 Betting Insights</div>
<div id="betting-insights"></div>

<div class="section-title">Upcoming Match</div>
<div class="grid" id="next-game-container"></div>

<div class="section-title">Last 5 Matches</div>
<div class="grid" id="past-games-container"></div>

</div>

<div class="right-col">
<div class="widget-box">
<h3>🏆 NBA Standings</h3>
<div id="standings-container" class="loading">Loading...</div>
</div>
</div>

</div>

<script>

async function fetchStandings() {
    const res = await fetch('https://site.api.espn.com/apis/v2/sports/basketball/nba/standings');
    const data = await res.json();

    let html = "";
    data.children.forEach(conf => {
        html += `<strong>${conf.name}</strong><br>`;
        conf.standings.entries.slice(0,8).forEach(team=>{
            const wins = team.stats.find(s=>s.name==="wins")?.value;
            const losses = team.stats.find(s=>s.name==="losses")?.value;
            html += `${team.team.shortDisplayName} (${wins}-${losses})<br>`;
        });
        html += "<br>";
    });

    document.getElementById("standings-container").innerHTML = html;
}

async function fetchGames() {

    const teamId = document.getElementById("team-select").value;

    const scheduleRes = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/nba/teams/${teamId}/schedule`);
    const scheduleData = await scheduleRes.json();

    const completedGames = scheduleData.events.filter(e=>e.competitions[0].status.type.completed);
    const upcomingGames = scheduleData.events.filter(e=>!e.competitions[0].status.type.completed);

    const last5 = completedGames.slice(-5).reverse();
    const nextGame = upcomingGames[0];

    calculateInsights(last5);

    if(nextGame){
        document.getElementById("next-game-container").innerHTML = await buildGameCard(nextGame.id,true);
    }

    const pastHTML = await Promise.all(last5.map(g=>buildGameCard(g.id,false)));
    document.getElementById("past-games-container").innerHTML = pastHTML.join("");
}

async function calculateInsights(last5){

    let wins=0;
    let margins=[];
    let totals=[];

    for(let g of last5){
        const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/nba/summary?event=${g.id}`);
        const data = await res.json();
        const comp = data.header.competitions[0];
        const home = comp.competitors.find(c=>c.homeAway==="home");
        const away = comp.competitors.find(c=>c.homeAway==="away");

        const homeScore=parseInt(home.score);
        const awayScore=parseInt(away.score);

        if(home.winner || away.winner) wins++;

        margins.push(Math.abs(homeScore-awayScore));
        totals.push(homeScore+awayScore);
    }

    const avgMargin=(margins.reduce((a,b)=>a+b,0)/margins.length).toFixed(1);
    const avgTotal=(totals.reduce((a,b)=>a+b,0)/totals.length).toFixed(1);
    const confidence=Math.min(95,50+avgMargin*2);

    document.getElementById("betting-insights").innerHTML=`
    <div class="insight-box">
    Wins (L5): ${wins}-${5-wins}<br>
    Avg Margin: ${avgMargin}<br>
    Avg Total: ${avgTotal}<br><br>
    Confidence: ${confidence}%<br>
    Trend: ${wins>=4?"🔥 HOT":wins<=1?"❄️ COLD":"➖ Neutral"}
    </div>`;
}

async function buildGameCard(matchId,isUpcoming){

    const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/nba/summary?event=${matchId}`);
    const data = await res.json();

    const comp=data.header.competitions[0];
    const home=comp.competitors.find(c=>c.homeAway==="home");
    const away=comp.competitors.find(c=>c.homeAway==="away");

    const homeScore=isUpcoming?"":home.score;
    const awayScore=isUpcoming?"":away.score;

    const homeClass=!isUpcoming?(home.winner?"winner":"loser"):"";
    const awayClass=!isUpcoming?(away.winner?"winner":"loser"):"";

    let spreadStr="Spread N/A";
    let coverHTML="";

    if(data.pickcenter?.length){
        spreadStr=data.pickcenter[0].details||spreadStr;

        if(!isUpcoming && data.pickcenter[0].details){
            const match=spreadStr.match(/([A-Z]+)\s(-?\d+\.?\d*)/);
            if(match){
                const fav=match[1];
                const spread=parseFloat(match[2]);
                const margin=parseInt(homeScore)-parseInt(awayScore);
                let covered=false;

                if(home.team.abbreviation===fav){
                    covered=margin>spread;
                } else if(away.team.abbreviation===fav){
                    covered=-margin>spread;
                }

                coverHTML=`<div class="${covered?'covered':'not-covered'}">
                ${covered?'✅ Covered':'❌ Did Not Cover'}
                </div>`;
            }
        }
    }

    const prob = Math.floor(Math.random()*40)+50;

    return `
    <div class="game-card">
        <div class="game-header">${new Date(comp.date).toLocaleString()}</div>
        <div class="team-score ${awayClass}">
            <span>${away.team.abbreviation}</span>
            <span>${awayScore}</span>
        </div>
        <div class="team-score ${homeClass}">
            <span>${home.team.abbreviation} (H)</span>
            <span>${homeScore}</span>
        </div>
        <div class="spread-box">🎯 ${spreadStr}</div>
        ${coverHTML}
        ${isUpcoming?`
        <div class="prob-bar">
            <div class="home-prob" style="width:${prob}%"></div>
        </div>
        `:""}
    </div>`;
}

fetchStandings();

</script>

</body>
</html>
