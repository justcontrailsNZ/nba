<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Team Hub & Live Standings</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        
        .layout-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 1450px;
            margin: 0 auto;
        }
        
        .left-col { flex: 6.5; min-width: 600px; }
        .right-col { flex: 3.5; min-width: 350px; display: flex; flex-direction: column; gap: 20px; }

        .header-box { text-align: center; margin-bottom: 20px; }
        h1 { color: #1d428a; margin-bottom: 5px; }
        .subtitle { color: #555; font-size: 14px; }
        
        .controls { text-align: center; margin-bottom: 30px; }
        select, button { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; margin: 5px; }
        button { background-color: #c8102e; color: white; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #a00c24; }
        
        .section-title {
            font-size: 20px; color: #1d428a; border-bottom: 2px solid #c8102e;
            padding-bottom: 5px; margin-bottom: 15px; display: inline-block;
        }

        /* Layout Grids */
        .grid { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 40px; }
        .upcoming-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 40px; align-items: stretch; }
        .upcoming-item { flex: 1; min-width: 300px; }
        
        /* Past Games Specific Grid (3 per row) */
        .past-games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        /* Responsive Breakpoints for Past Games Grid */
        @media (max-width: 1200px) { .past-games-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 800px) { .past-games-grid { grid-template-columns: 1fr; } }
        
        .game-card {
            background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%; padding: 15px; box-sizing: border-box;
            display: flex; flex-direction: column; border: 1px solid #e1e4e8; height: 100%;
        }
        
        /* Specific sizing overrides for past game cards to fit 3 perfectly */
        .past-games-grid .game-card { padding: 12px; }
        .past-games-grid .game-header { font-size: 11px; margin-bottom: 6px; padding-bottom: 6px;}
        .past-games-grid .team-score { font-size: 14px; margin: 4px 0; }
        .past-games-grid .spread-box { font-size: 10px; padding: 4px; margin: 6px 0;}
        .past-games-grid .team-perf-title { font-size: 10px; padding: 4px 8px; }
        .past-games-grid .performer-list { font-size: 11px; padding: 6px 8px; }

        .game-header { text-align: center; font-size: 13px; color: #777; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 10px; font-weight: bold; }
        .team-score { display: flex; justify-content: space-between; font-size: 17px; margin: 6px 0; font-weight: bold; }
        .winner { color: #1d428a; }
        .loser { color: #888; font-weight: normal; }
        .spread-box { text-align: center; background-color: #f8f9fa; border: 1px dashed #ccc; padding: 5px; font-size: 12px; border-radius: 4px; margin: 10px 0; color: #444; font-weight: bold; }

        /* Betting Trend Hot Indicator */
        .hot-indicator-box {
            background: #fff; border-radius: 8px; border: 1px solid #e1e4e8;
            padding: 20px; display: flex; flex-direction: column; justify-content: center;
            align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); height: 100%; box-sizing: border-box;
        }
        .trend-badge { padding: 8px 16px; border-radius: 20px; color: white; font-weight: bold; font-size: 16px; text-transform: uppercase; margin-bottom: 15px; }
        .trend-details { font-size: 14px; color: #555; text-align: center; line-height: 1.6;}
        .trend-details b { color: #1d428a; font-size: 16px; }

        /* Prediction Model UI */
        .prediction-box {
            background: #eef2f5; border-radius: 6px; padding: 10px; margin-top: auto;
            border: 1px solid #d1d9e6; text-align: center;
        }
        .pred-title { font-size: 12px; font-weight: bold; color: #333; margin-bottom: 8px; text-transform: uppercase; }
        .pred-bar-container { display: flex; height: 20px; border-radius: 10px; overflow: hidden; margin-bottom: 8px; }
        .pred-bar { display: flex; align-items: center; justify-content: center; color: white; font-size: 11px; font-weight: bold; transition: width 0.5s ease; }
        .pred-bar.away { background-color: #555; }
        .pred-bar.home { background-color: #1d428a; }
        .pred-text { font-size: 12px; color: #444; }

        /* Performers Box (For Past Games Only) */
        .performers-box { border-radius: 6px; margin-top: 8px; background-color: #fff; border: 1px solid #ddd; overflow: hidden; }
        .team-perf-title { font-weight: bold; text-transform: uppercase; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.6); }
        .performer-list { list-style-type: none; margin: 0; color: #333; background-color: #fafafa; }
        .performer-list li { margin-bottom: 4px; display: flex; flex-direction: column; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .performer-list li:last-child { margin-bottom: 0; border-bottom: none; padding-bottom: 0;}

        /* News Cards */
        .news-card {
            background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%; max-width: 320px; padding: 15px; box-sizing: border-box;
            display: flex; flex-direction: column; border: 1px solid #e1e4e8;
        }
        .news-card h3 { font-size: 16px; margin-top: 0; line-height: 1.3; }
        .news-card a { text-decoration: none; color: #1d428a; }
        .news-card a:hover { text-decoration: underline; }
        .news-card p { font-size: 13px; color: #555; line-height: 1.4; flex-grow: 1; margin: 10px 0; }
        .news-date { font-size: 11px; color: #888; margin-top: auto; padding-top: 10px; border-top: 1px solid #eee; }

        /* Widgets (Standings & Leaders) */
        .widget-box { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 15px; border: 1px solid #e1e4e8; }
        .widget-box h2 { font-size: 17px; color: #333; margin-top: 0; border-bottom: 2px solid #1d428a; padding-bottom: 5px; margin-bottom: 10px; }
        
        .conf-title { font-size: 13px; color: white; margin: 15px 0 0 0; background: #c8102e; padding: 6px; border-radius: 4px 4px 0 0; text-align: center;}
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 6px; color: #555; background-color: #f1f3f5; border-bottom: 2px solid #ddd; }
        td { padding: 6px; border-bottom: 1px solid #eee; }
        tr:hover { background-color: #f9f9f9; }

        /* Top 15 Points Leaders List */
        .leaders-list { margin: 0; padding: 0; list-style-type: none; font-size: 13px; color: #333; }
        .leaders-list li { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px dashed #e1e4e8; align-items: center; }
        .leaders-list li:last-child { border-bottom: none; }
        .leader-rank { font-weight: bold; color: #999; width: 22px; display: inline-block; }
        .leader-val { font-weight: bold; color: #c8102e; font-size: 15px; }

        .loading { color: #666; font-style: italic; font-size: 13px; padding: 10px; }
    </style>
</head>

                    <div class="upcoming-item" id="hot-indicator-container"></div>
                </div>
                
                <div class="section-title">Last 5 Matches</div>
                <!-- Updated to use the new 3-column specific CSS Grid -->

                <p style="color:#777; text-align:center; padding: 50px;">Use the dropdown above to load specific team data.</p>

        <!-- RIGHT COLUMN -->
        <div class="right-col">

                <h2>🏆 NBA Standings</h2>

            </div>
            
            <div class="widget-box">

    <script>
        const NEWS_API_KEY = 'pub_dce2909d7f99428199a11eb8be5c290e';

        function initGlobalData() {
            fetchStandings();
            fetchLeaders();
        }

        async function fetchStandings() {
            try {
                const res = await fetch('https://site.api.espn.com/apis/v2/sports/basketball/nba/standings');
                const data = await res.json();
                let html = '';
                if(data && data.children) {
                    data.children.forEach(conf => {
                        html += `<div class="conf-title">${conf.name || 'Conference'}</div>`;
                        html += `<table><tr><th>#</th><th>Team</th><th>W-L</th><th>GB</th><th>L10</th></tr>`;
                        
                        let sortedTeams = conf.standings.entries.sort((a, b) => {
                            const seedA = parseInt(a.stats.find(s => s.name === 'playoffSeed')?.value || 99);
                            const seedB = parseInt(b.stats.find(s => s.name === 'playoffSeed')?.value || 99);
                            return seedA - seedB;
                        });

                        sortedTeams.forEach(team => {
                            const seed = team.stats.find(s => s.name === 'playoffSeed')?.value || '-';
                            const wins = team.stats.find(s => s.name === 'wins')?.value || 0;
                            const losses = team.stats.find(s => s.name === 'losses')?.value || 0;
                            const gb = team.stats.find(s => s.name === 'gamesBehind')?.displayValue || '-';
                            const l10 = team.stats.find(s => s.abbreviation === 'L10' || s.name === 'last10Games')?.displayValue || '-';
                            const name = team.team.shortDisplayName || team.team.displayName || 'Unknown';
                            
                            html += `<tr><td><b>${seed}</b></td><td>${name}</td><td>${wins}-${losses}</td><td>${gb}</td><td>${l10}</td></tr>`;
                        });
                        html += `</table>`;
                    });
                }
                document.getElementById('standings-container').innerHTML = html;
            } catch (e) {
                document.getElementById('standings-container').innerHTML = '<p style="color:red">Failed to load standings.</p>';
            }
        }

        async function fetchLeaders() {
            try {
                const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/nba/statistics?limit=15');
                const data = await res.json();
                let pointsData = null;

                if (data.stats) {
                    for (let statGroup of data.stats) {
                        if (statGroup.categories) {
                            for (let cat of statGroup.categories) {
                                if (cat.name === 'points' || cat.name === 'pointsPerGame') {
                                    pointsData = cat.leaders; break;
                                }
                            }
                        }
                    }
                }

                if (!pointsData || pointsData.length === 0) {
                    document.getElementById('leaders-container').innerHTML = '<p>No points data available right now.</p>'; return;
                }
                
                let html = '<ul class="leaders-list">';
                let rank = 1;
                pointsData.slice(0, 15).forEach(p => {
                    const pName = p.athlete?.shortName || p.athlete?.displayName || 'Unknown';
                    const teamAbbr = p.team?.abbreviation ? `(${p.team.abbreviation})` : '';
                    const val = p.displayValue || p.value || 0;
                    html += `<li><span><span class="leader-rank">${rank}.</span> ${pName} <span style="color:#888;font-size:11px;">${teamAbbr}</span></span> <span class="leader-val">${val} <span style="font-size:10px; color:#777;">PTS</span></span></li>`;
                    rank++;
                });
                html += `</ul>`;
                document.getElementById('leaders-container').innerHTML = html;
            } catch (e) {
                document.getElementById('leaders-container').innerHTML = '<p style="color:red">Failed to load leaders.</p>';
            }
        }

        // --- FETCH TEAM DATA ---
        function fetchTeamData() {
            const selectEl = document.getElementById('team-select');
            const teamName = selectEl.value;
            const espnId = selectEl.options[selectEl.selectedIndex].getAttribute('data-id');

            document.getElementById('team-placeholder').style.display = 'none';
            document.getElementById('team-content').style.display = 'block';

            fetchGames(espnId);
            fetchNews(teamName);
        }

        async function fetchGames(espnId) {
            const nextContainer = document.getElementById('next-game-container');
            const pastContainer = document.getElementById('past-games-container');
            const hotContainer = document.getElementById('hot-indicator-container');
            
            nextContainer.innerHTML = '<div class="loading">Finding next game...</div>';
            pastContainer.innerHTML = '<div class="loading">Loading match history...</div>';
            hotContainer.innerHTML = '<div class="loading">Analyzing recent performance...</div>';

            try {
                const scheduleRes = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/nba/teams/${espnId}/schedule`);
                const scheduleData = await scheduleRes.json();

                const completedGames = scheduleData.events.filter(e => e.competitions[0].status.type.completed === true);
                const upcomingGames = scheduleData.events.filter(e => e.competitions[0].status.type.completed === false);

                const last5Games = completedGames.slice(-5).reverse();
                const nextGame = upcomingGames.length > 0 ? upcomingGames[0] : null;

                // --- CALCULATE BETTING PATTERN "HOT" INDICATOR ---
                let winCount = 0;
                let totalPts = 0;
                let validGames = 0;

                last5Games.forEach(game => {
                    const comp = game.competitions[0];
                    const targetTeam = comp.competitors.find(c => c.team.id === espnId);
                    if (targetTeam) {
                        if (targetTeam.winner) winCount++;
                        if (targetTeam.score && targetTeam.score.value) {
                            totalPts += parseInt(targetTeam.score.value);
                            validGames++;
                        }
                    }
                });

                let trendIcon = "⚖️"; let trendText = "NEUTRAL"; let trendColor = "#555";
                if (winCount >= 4) { trendIcon = "🔥"; trendText = "HOT"; trendColor = "#c8102e"; }
                else if (winCount <= 1) { trendIcon = "🧊"; trendText = "COLD"; trendColor = "#1d428a"; }

                const avgPts = validGames > 0 ? Math.round(totalPts / validGames) : "--";

                hotContainer.innerHTML = `
                    <div class="hot-indicator-box">
                        <div class="trend-badge" style="background-color: ${trendColor}">${trendIcon} ${trendText} TREND</div>
                        <div class="trend-details">
                            Form: <b>${winCount}W - ${last5Games.length - winCount}L</b><br>
                            (Over Last ${last5Games.length} Matches)<br><br>
                            Average Offense: <b>${avgPts}</b> PTS/G
                        </div>
                    </div>
                `;

                // --- BUILD UPCOMING MATCH CARD ---
                if (nextGame) {
                    nextContainer.innerHTML = await buildGameCard(nextGame.id, true);
                } else {
                    nextContainer.innerHTML = '<p>No upcoming games scheduled.</p>';
                }

                // --- BUILD LAST 5 MATCHES ---
                if (last5Games.length === 0) {
                    pastContainer.innerHTML = '<p>No completed games found.</p>';
                } else {
                    const pastHTMLs = await Promise.all(last5Games.map(g => buildGameCard(g.id, false)));
                    pastContainer.innerHTML = pastHTMLs.join('');
                }

            } catch (error) {
                nextContainer.innerHTML = '<div class="loading" style="color:red;">Failed to load schedule.</div>';
                pastContainer.innerHTML = '';
            }
        }

        async function buildGameCard(matchId, isUpcoming) {
            try {
                const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/nba/summary?event=${matchId}`);
                const data = await res.json();

                const headerComp = data.header.competitions[0];
                const dateObj = new Date(headerComp.date);
                const dateStr = dateObj.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                
                const homeTeam = headerComp.competitors.find(c => c.homeAway === 'home');
                const awayTeam = headerComp.competitors.find(c => c.homeAway === 'away');

                const homeClass = isUpcoming ? '' : (homeTeam.winner ? 'winner' : 'loser');
                const awayClass = isUpcoming ? '' : (awayTeam.winner ? 'winner' : 'loser');
                const homeScore = isUpcoming ? '' : (homeTeam.score || '0');
                const awayScore = isUpcoming ? '' : (awayTeam.score || '0');
                
                const homeName = homeTeam.team.shortDisplayName || homeTeam.team.displayName || 'Home Team';
                const homeAbbr = homeTeam.team.abbreviation || 'HME';
                const awayName = awayTeam.team.shortDisplayName || awayTeam.team.displayName || 'Away Team';
                const awayAbbr = awayTeam.team.abbreviation || 'AWY';

                // Get Betting Spread
                let spreadStr = "Spread Not Available";
                if (data.pickcenter && data.pickcenter.length > 0 && data.pickcenter[0].details) {
                    spreadStr = `Odds: ${data.pickcenter[0].details}`;
                    if (data.pickcenter[0].overUnder) spreadStr += ` | O/U: ${data.pickcenter[0].overUnder}`;
                }

                // --- SIMPLE PREDICTION MODEL (Frontend Version) ---
                let predictionHTML = '';
                if (isUpcoming) {
                    const parseWinPct = (teamObj) => {
                        try {
                            const recStr = teamObj.record[0].summary;
                            const parts = recStr.split('-');
                            const w = parseInt(parts[0]); const l = parseInt(parts[1]);
                            return w / (w + l);
                        } catch (e) { return 0.5; }
                    };

                    const homePct = parseWinPct(homeTeam);
                    const awayPct = parseWinPct(awayTeam);

                    let homePower = (homePct * 100) + 6; // Home edge
                    let awayPower = (awayPct * 100);
                    let totalPower = homePower + awayPower;

                    let homeProb = Math.round((homePower / totalPower) * 100);
                    let awayProb = 100 - homeProb;
                    let predictedWinner = homeProb > awayProb ? homeName : awayName;

                    predictionHTML = `
                        <div class="prediction-box">
                            <div class="pred-title">🤖 AI Match Prediction</div>
                            <div class="pred-bar-container">
                                <div class="pred-bar away" style="width: ${awayProb}%">${awayAbbr} ${awayProb}%</div>
                                <div class="pred-bar home" style="width: ${homeProb}%">${homeAbbr} ${homeProb}%</div>
                            </div>
                            <div class="pred-text">Projected Winner: <b>${predictedWinner}</b></div>
                        </div>
                    `;
                }

                // Get Player Performers (ONLY for past games)
                let performersHTML = '';
                if (!isUpcoming) {
                    if (data.boxscore && data.boxscore.players) {
                        data.boxscore.players.forEach(teamData => {
                            const tName = teamData.team.displayName || 'Team';
                            const bgColor = teamData.team.color || '333333';
                            const statsData = teamData.statistics[0];
                            
                            performersHTML += `<div class="performers-box"><div class="team-perf-title" style="background-color: #${bgColor};">${tName} Top 3</div><ul class="performer-list">`;
                            if (statsData && statsData.athletes) {
                                const labels = statsData.labels || [];
                                const ptsIdx = labels.indexOf('PTS'); const rebIdx = labels.indexOf('REB'); const astIdx = labels.indexOf('AST');
                                const activePlayers = statsData.athletes.filter(a => !a.didNotPlay);
                                activePlayers.sort((a, b) => parseInt((b.stats && b.stats[ptsIdx]) || 0) - parseInt((a.stats && a.stats[ptsIdx]) || 0));
                                
                                const top3 = activePlayers.slice(0, 3);
                                if(top3.length > 0) {
                                    top3.forEach(p => {
                                        performersHTML += `<li><b>${p.athlete?.shortName || 'Unknown'}</b> <span>${(p.stats && p.stats[ptsIdx]) || 0} PTS, ${(p.stats && p.stats[rebIdx]) || 0} REB, ${(p.stats && p.stats[astIdx]) || 0} AST</span></li>`;
                                    });
                                } else { performersHTML += `<li>No active player stats</li>`; }
                            } else { performersHTML += `<li>Stats not available</li>`; }
                            performersHTML += `</ul></div>`;
                        });
                    }
                }

                return `
                    <div class="game-card">
                        <div class="game-header">${dateStr} • ${headerComp.status?.type?.detail || 'Scheduled'}</div>
                        <div class="team-score ${awayClass}">
                            <span>${awayAbbr} ${awayName}</span><span>${awayScore}</span>
                        </div>
                        <div class="team-score ${homeClass}">
                            <span>${homeAbbr} ${homeName} (H)</span><span>${homeScore}</span>
                        </div>
                        <div class="spread-box">🎯 ${spreadStr}</div>
                        ${predictionHTML}
                        ${performersHTML}
                    </div>
                `;
            } catch (e) {
                return `<div class="game-card"><p style="color:red; font-size:12px;">Error loading game details</p></div>`;
            }
        }

        async function fetchNews(teamName) {
            const container = document.getElementById('news-container');
            container.innerHTML = '<div class="loading">Searching for the latest news articles...</div>';
            const query = teamName.split(' ').join(' AND ');
            const url = `https://newsdata.io/api/1/news?apikey=${NEWS_API_KEY}&q=${encodeURIComponent(query)}&category=sports&language=en`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                container.innerHTML = ''; 

                if (data.status === "error") { container.innerHTML = `<p style="color:red;">Error: ${data.results.message || data.message || 'API Error'}</p>`; return; }

                if (data.results && data.results.length > 0) {
                    const teamMascot = teamName.split(' ').pop().toLowerCase();
                    const relevantArticles = data.results.filter(article => {
                        const titleText = (article.title || "").toLowerCase();
                        const descText = (article.description || "").toLowerCase();
                        return titleText.includes(teamMascot) || descText.includes(teamMascot);
                    });

                    if (relevantArticles.length > 0) {
                        relevantArticles.forEach(article => {
                            const date = new Date(article.pubDate).toLocaleDateString();
                            let description = "Click the link to read the full story.";
                            if (article.description) description = article.description.length > 150 ? article.description.substring(0, 150) + "..." : article.description;
                            
                            const card = document.createElement('div');
                            card.className = 'news-card';
                            card.innerHTML = `<h3><a href="${article.link || '#'}" target="_blank">${article.title || 'Read latest update'}</a></h3>
                                              <p>${description}</p><div class="news-date">Published: ${date}</div>`;
                            container.appendChild(card);
                        });
                    } else { container.innerHTML = '<p>No specific news found for this team right now.</p>'; }
                } else { container.innerHTML = '<p>No news found for this team right now.</p>'; }
            } catch (error) { container.innerHTML = '<p style="color:red;">Something went wrong. Please check your console.</p>'; }
        }
    </script>
